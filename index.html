<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lola — Briefing Diário</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --red: #8B1A1A;
    --red-light: #f9eaea;
    --red-mid: #c0392b;
    --border: #e8d5d5;
    --bg: #fdf6f6;
    --text: #1a1a1a;
    --muted: #888;
    --faint: #ccc;
  }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

  /* TOPBAR */
  .topbar { background: #fff; border-bottom: 2px solid var(--red); display: flex; align-items: center; height: 52px; padding: 0 1.25rem; position: sticky; top: 0; z-index: 100; }
  .topbar-logo { font-size: 18px; font-weight: 600; color: var(--red); letter-spacing: -0.5px; margin-right: 12px; }
  .topbar-nav { display: flex; gap: 2px; flex: 1; overflow-x: auto; }
  .topbar-tab { padding: 0 12px; height: 52px; display: flex; align-items: center; font-size: 13px; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -2px; white-space: nowrap; transition: color 0.15s; }
  .topbar-tab.active { color: var(--red); border-bottom-color: var(--red); font-weight: 500; }
  .topbar-tab:hover { color: var(--red); }
  .topbar-user { margin-left: auto; width: 30px; height: 30px; border-radius: 50%; background: var(--red); color: #fff; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; flex-shrink: 0; }

  /* SCREENS */
  .screen { display: none; padding: 1.25rem; max-width: 520px; margin: 0 auto; }
  .screen.active { display: block; }
  .page-title { font-size: 20px; font-weight: 600; color: var(--text); margin-bottom: 1.25rem; }

  /* FORM */
  .field-label { font-size: 12px; color: var(--muted); margin-bottom: 4px; display: block; }
  .dow-label { display: inline-block; margin-left: 8px; font-size: 12px; font-weight: 500; color: var(--red); }
  .input-field { width: 100%; border-radius: 8px; border: 0.5px solid var(--border); padding: 9px 12px; font-size: 14px; font-family: 'DM Sans', sans-serif; color: var(--text); background: #fff; margin-bottom: 12px; transition: border-color 0.15s; }
  .input-field:focus { outline: none; border-color: var(--red); }
  .turno-select { display: flex; gap: 8px; margin-bottom: 12px; }
  .turno-btn { flex: 1; padding: 10px; border: 0.5px solid var(--border); border-radius: 8px; font-size: 13px; font-family: 'DM Sans', sans-serif; cursor: pointer; background: #fff; color: var(--muted); text-align: center; transition: all 0.15s; }
  .turno-btn.selected { border-color: var(--red); color: var(--red); background: var(--red-light); font-weight: 500; }

  /* BUTTONS */
  .btn-primary { display: flex; align-items: center; justify-content: center; gap: 6px; width: 100%; padding: 11px; background: var(--red); color: #fff; border: none; border-radius: 8px; font-size: 14px; font-family: 'DM Sans', sans-serif; font-weight: 500; cursor: pointer; margin-top: 8px; transition: background 0.15s; }
  .btn-primary:hover { background: #721515; }
  .btn-outline { display: flex; align-items: center; justify-content: center; gap: 6px; width: 100%; padding: 10px; background: #fff; color: var(--red); border: 1px solid var(--red); border-radius: 8px; font-size: 13px; font-family: 'DM Sans', sans-serif; cursor: pointer; margin-top: 8px; transition: background 0.15s; }
  .btn-outline:hover { background: var(--red-light); }

  /* BADGES */
  .badge { display: inline-block; padding: 2px 8px; border-radius: 99px; font-size: 10px; font-weight: 500; }
  .badge-ok { background: #e6f4d7; color: #3a6b10; }
  .badge-partial { background: #fef3cd; color: #7d5a00; }
  .badge-dia { background: #fff7e0; color: #8a6200; }
  .badge-noite { background: #ece8f8; color: #4a3b8c; }
  .badge-clima { background: #e8f4fb; color: #1a5a7a; }

  /* CARDS */
  .card { background: #fff; border: 0.5px solid var(--border); border-radius: 10px; padding: 1rem 1.1rem; margin-bottom: 8px; }
  .card-badges { display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 6px; }
  .card-title { font-size: 14px; font-weight: 500; color: var(--text); }
  .card-meta { font-size: 11px; color: var(--muted); margin-top: 3px; }
  .card-clickable { cursor: pointer; transition: border-color 0.15s; }
  .card-clickable:hover { border-color: #c8a0a0; }

  /* CHECKLIST */
  .section-tabs { display: flex; gap: 6px; margin-bottom: 1rem; flex-wrap: wrap; }
  .tab { padding: 5px 14px; border-radius: 99px; border: 0.5px solid var(--border); font-size: 12px; cursor: pointer; background: #fff; color: var(--muted); transition: all 0.15s; }
  .tab.active { background: var(--red); color: #fff; border-color: var(--red); }
  .checklist-item { display: flex; align-items: flex-start; gap: 10px; padding: 9px 0; border-bottom: 0.5px solid #f0e4e4; }
  .checklist-item:last-child { border-bottom: none; }
  .checklist-item input[type=checkbox] { width: 16px; height: 16px; margin-top: 2px; accent-color: var(--red); cursor: pointer; flex-shrink: 0; }
  .checklist-item label { font-size: 13px; color: #333; cursor: pointer; line-height: 1.5; }
  .checklist-item label.done { text-decoration: line-through; color: var(--faint); }
  .progress-wrap { background: #f0e4e4; border-radius: 99px; height: 4px; margin-bottom: 1rem; overflow: hidden; }
  .progress-bar { height: 4px; background: var(--red); border-radius: 99px; transition: width 0.3s; }
  .progress-label { font-size: 11px; color: var(--muted); margin-bottom: 5px; }
  .info-box { background: #fff; border: 0.5px solid var(--border); border-radius: 10px; padding: 10px 14px; margin-bottom: 1rem; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 6px; }
  textarea.obs { width: 100%; border-radius: 8px; border: 0.5px solid var(--border); padding: 9px 11px; font-size: 13px; font-family: 'DM Sans', sans-serif; color: #333; background: #fff; resize: vertical; min-height: 70px; }
  textarea.obs:focus { outline: none; border-color: var(--red); }

  /* CALENDAR */
  .cal-wrap { background: #fff; border: 0.5px solid var(--border); border-radius: 10px; padding: 12px 14px; margin-bottom: 14px; }
  .cal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .cal-month { font-size: 14px; font-weight: 500; }
  .cal-nav { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 18px; padding: 2px 6px; border-radius: 4px; line-height: 1; }
  .cal-nav:hover { background: var(--red-light); color: var(--red); }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
  .cal-dow { text-align: center; font-size: 10px; color: var(--faint); padding: 2px 0 5px; }
  .cal-day { text-align: center; font-size: 12px; color: var(--faint); min-height: 28px; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 5px; }
  .cal-day.closed { color: #edd5d5; }
  .cal-day.has-record { cursor: pointer; color: var(--text); background: var(--bg); }
  .cal-day.has-record:hover { background: var(--red-light); color: var(--red); }
  .cal-day.today { color: var(--red); font-weight: 600; }
  .cal-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--red); margin-top: 2px; }

  /* SECTION LABEL */
  .section-label { font-size: 10px; font-weight: 500; color: var(--faint); text-transform: uppercase; letter-spacing: 0.07em; margin: 1rem 0 8px; }

  /* DETAIL */
  .detail-section { margin-bottom: 1rem; }
  .detail-section-title { font-size: 10px; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
  .detail-item { display: flex; align-items: center; gap: 8px; font-size: 13px; padding: 3px 0; }
  .ok-icon { color: #3a6b10; font-size: 14px; }
  .no-icon { color: #c0392b; font-size: 14px; }
  .not-done-item { display: flex; align-items: center; gap: 8px; font-size: 12px; padding: 5px 9px; background: #fef3cd; border-radius: 6px; margin-bottom: 3px; color: #7d5a00; }
  .all-done { font-size: 13px; color: #3a6b10; background: #e6f4d7; border-radius: 8px; padding: 9px 12px; }

  /* REUNIÃO */
  .week-selector { display: flex; align-items: center; gap: 8px; margin-bottom: 1rem; }
  .week-label { font-size: 14px; font-weight: 500; flex: 1; text-align: center; }
  .obs-entry { background: #fff; border: 0.5px solid var(--border); border-radius: 8px; padding: 10px 13px; margin-bottom: 6px; }
  .obs-entry-meta { font-size: 10px; color: var(--muted); margin-bottom: 5px; }
  .obs-entry-text { font-size: 13px; color: #333; line-height: 1.5; }

  /* BACK */
  .back-btn { display: inline-flex; align-items: center; gap: 5px; font-size: 13px; color: var(--muted); cursor: pointer; background: none; border: none; padding: 0; margin-bottom: 1rem; font-family: 'DM Sans', sans-serif; }
  .back-btn:hover { color: var(--red); }

  /* EMPTY / LOADING */
  .empty { text-align: center; padding: 3rem 1rem; color: var(--faint); font-size: 13px; }
  .loading { text-align: center; padding: 2rem; color: var(--muted); font-size: 13px; }
  .toast { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%); background: #1a1a1a; color: #fff; padding: 10px 20px; border-radius: 8px; font-size: 13px; z-index: 999; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
  .toast.show { opacity: 1; }
</style>
</head>
<body>

<div class="topbar">
  <span class="topbar-logo">Lola</span>
  <div class="topbar-nav" id="topbar-nav"></div>
  <div class="topbar-user" id="topbar-user-icon">?</div>
</div>

<div class="toast" id="toast"></div>

<!-- LOGIN -->
<div class="screen active" id="screen-login">
  <div class="page-title">Briefing diário</div>
  <div style="display:flex;align-items:center;margin-bottom:4px;">
    <label class="field-label" style="margin:0;">Data</label>
    <span class="dow-label" id="dow-label"></span>
  </div>
  <input class="input-field" type="date" id="input-data" oninput="updateDow()" />
  <label class="field-label">Seu nome</label>
  <input class="input-field" id="gerente-nome" placeholder="Ex: Ana, Carlos..." />
  <label class="field-label">Turno</label>
  <div class="turno-select">
    <div class="turno-btn" id="turno-dia" onclick="selectTurno('dia')">☀️ Dia</div>
    <div class="turno-btn" id="turno-noite" onclick="selectTurno('noite')">🌙 Noite</div>
  </div>
  <label class="field-label">Clima do dia</label>
  <select class="input-field" id="clima-select" style="margin-bottom:12px;">
    <option value="">Selecione o clima...</option>
    <option value="ensolarado">☀️ Ensolarado</option>
    <option value="nublado">☁️ Nublado</option>
    <option value="garoa">🌦️ Garoa</option>
    <option value="chuvoso">🌧️ Chuvoso</option>
    <option value="temporal">⛈️ Temporal</option>
    <option value="muito_frio">🥶 Muito frio</option>
    <option value="muito_calor">🥵 Muito calor</option>
    <option value="muito_vento">💨 Muito vento</option>
  </select>
  <button class="btn-primary" onclick="doLogin()">Entrar e preencher checklist</button>
  <button class="btn-outline" onclick="goHistorico()">📅 Histórico</button>
  <button class="btn-outline" onclick="goReuniao()">📋 Observações da semana</button>
</div>

<!-- CHECKLIST -->
<div class="screen" id="screen-checklist">
  <div class="info-box" id="checklist-info-box"></div>
  <div class="section-tabs" id="section-tabs"></div>
  <div class="progress-label" id="progress-label"></div>
  <div class="progress-wrap"><div class="progress-bar" id="progress-bar"></div></div>
  <div id="checklist-items"></div>
  <div style="margin-top:1.25rem;">
    <label class="field-label" style="margin-bottom:5px;">Observações do turno</label>
    <textarea class="obs" id="obs-text" placeholder="Eventos, reservas, reclamações, promoções, faltas, itens indisponíveis, manutenções..."></textarea>
  </div>
  <button class="btn-primary" id="btn-save" onclick="saveChecklist()">Salvar registro</button>
  <button class="btn-outline" onclick="showScreen('screen-login'); renderTopbar('checklist');">Sair</button>
</div>

<!-- CALENDAR -->
<div class="screen" id="screen-calendar">
  <div class="cal-wrap">
    <div class="cal-header">
      <button class="cal-nav" onclick="changeMonth(-1)">‹</button>
      <div class="cal-month" id="cal-month-label"></div>
      <button class="cal-nav" onclick="changeMonth(1)">›</button>
    </div>
    <div class="cal-grid" id="cal-grid"></div>
  </div>
  <div id="day-records"></div>
</div>

<!-- DETAIL -->
<div class="screen" id="screen-day-detail">
  <button class="back-btn" onclick="showScreen('screen-calendar'); renderTopbar('historico');">← Calendário</button>
  <div id="day-detail-content"></div>
</div>

<!-- REUNIÃO -->
<div class="screen" id="screen-reuniao">
  <div class="page-title">Observações da semana</div>
  <div class="week-selector">
    <button class="cal-nav" onclick="changeWeek(-1)">‹</button>
    <div class="week-label" id="week-label"></div>
    <button class="cal-nav" onclick="changeWeek(1)">›</button>
  </div>
  <div id="reuniao-content"><div class="loading">Carregando...</div></div>
</div>

<script>
const SUPABASE_URL = 'https://mvjbsdpfjhywhaonvpfl.supabase.co';
const SUPABASE_KEY = 'sb_publishable_VMJzYe1AwL9zEoFs-ljUIw_OOkDpqhy';
const TABLE = 'GerentesDiario';

const CHECKLISTS = {
  abertura: ["Ligar luzes","Testar sistema","Verificar caixa - trocos","POS carregadas","Abastecimento bobinas","Verificar e confirmar reservas","Fazer placas de reservas","Contagem geladeiras","Verificar uniformes da equipe","Contabilizar comandas","Verificar checklist abertura bar","Verificar checklist abertura salão","Verificar checklist limpeza","Checar itens indisponíveis","Ambientação - ar, música, cortinas","Verificar menus - limpeza","Verificar carta de vinhos","Montar escala para o dia","Verificar caderno de filas","Verificar banheiros"],
  troca: ["Colocar placa na travessa às 20h","Verificar e montar reservas","Verificar abastecimento geladeiras","Verificar intervalos da equipe","Ligar luzes da cúpula","Colocar luminárias nas mesas"],
  fechamento: ["Contabilizar comandas","Verificar comandas abertas","Tirar relatórios maquininhas","Fechar caixa - subir envelope","Conferir checklists limpeza e cozinha","Preencher planilha de metas","Contabilizar PAX e mandar no grupo do caixa","Subir placa da travessa","Verificar checklist fechamento bar","Verificar checklist fechamento salão","Deixar maquininhas carregando","Carregar luminárias no escritório","Pagamento de freelas no caderno","Desligar ar condicionado","Desligar luzes","Verificar se janelas estão trancadas","Trancar escritório"]
};
const SECOES_POR_TURNO = { dia: ['abertura','troca'], noite: ['fechamento'] };
const SECTION_LABELS = { abertura:'Abertura', troca:'Troca de turno', fechamento:'Fechamento' };
const DIAS = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
const DIAS_FULL = ['Domingo','Segunda-feira','Terça-feira','Quarta-feira','Quinta-feira','Sexta-feira','Sábado'];
const MESES = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const CLIMA_LABELS = { ensolarado:'☀️ Ensolarado', nublado:'☁️ Nublado', chuvoso:'🌧️ Chuvoso', temporal:'⛈️ Temporal', muito_frio:'🥶 Muito frio', muito_calor:'🥵 Muito calor', muito_vento:'💨 Muito vento', garoa:'🌦️ Garoa' };

let currentUser='', currentTurno='', currentSection='', currentDateKey='', currentDateLabel='';
let checked={ abertura:{}, troca:{}, fechamento:{} };
let calYear=new Date().getFullYear(), calMonth=new Date().getMonth(), allRecords=[];
let currentWeekOffset=0;

document.getElementById('input-data').value = new Date().toISOString().split('T')[0];
updateDow();

// SUPABASE
async function dbInsert(record) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${TABLE}`, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${SUPABASE_KEY}`,
      'Prefer': 'return=minimal'
    },
    body: JSON.stringify(record)
  });
  if (!res.ok) {
    const err = await res.text();
    throw new Error(err);
  }
}

async function dbFetch(dateFrom, dateTo) {
  let url = `${SUPABASE_URL}/rest/v1/${TABLE}?order=date_key.desc,created_at.desc`;
  if (dateFrom) url += `&date_key=gte.${dateFrom}`;
  if (dateTo) url += `&date_key=lte.${dateTo}`;
  const res = await fetch(url, {
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
  });
  if (!res.ok) throw new Error(await res.text());
  return await res.json();
}

async function dbFetchAll() {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${TABLE}?order=date_key.desc,created_at.desc&limit=500`, {
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
  });
  if (!res.ok) throw new Error(await res.text());
  return await res.json();
}

function showToast(msg, duration=2500) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), duration);
}

function updateDow() {
  const val = document.getElementById('input-data').value;
  if (!val) { document.getElementById('dow-label').textContent=''; return; }
  const [y,m,d] = val.split('-');
  const dt = new Date(+y,+m-1,+d);
  const dow = dt.getDay();
  const el = document.getElementById('dow-label');
  el.textContent = DIAS_FULL[dow];
  el.style.color = (dow===0||dow===1) ? '#c0392b' : 'var(--red)';
}

function renderTopbar(active) {
  document.getElementById('topbar-nav').innerHTML = [
    {id:'checklist', label:'Checklist', fn:"showScreen('screen-login'); renderTopbar('checklist');"},
    {id:'historico', label:'Histórico', fn:"goHistorico();"},
    {id:'reuniao', label:'Reunião', fn:"goReuniao();"}
  ].map(t=>`<div class="topbar-tab${active===t.id?' active':''}" onclick="${t.fn}">${t.label}</div>`).join('');
}

function selectTurno(t) {
  currentTurno=t;
  document.getElementById('turno-dia').classList.toggle('selected',t==='dia');
  document.getElementById('turno-noite').classList.toggle('selected',t==='noite');
}

function doLogin() {
  const nome=document.getElementById('gerente-nome').value.trim();
  const dataVal=document.getElementById('input-data').value;
  const clima=document.getElementById('clima-select').value;
  if(!dataVal){alert('Selecione a data.');return;}
  if(!nome){alert('Informe seu nome.');return;}
  if(!currentTurno){alert('Selecione o turno.');return;}
  if(!clima){alert('Selecione o clima.');return;}
  currentUser=nome; currentDateKey=dataVal;
  const [y,m,d]=dataVal.split('-');
  const dt=new Date(+y,+m-1,+d);
  currentDateLabel=`${DIAS_FULL[dt.getDay()]}, ${d}/${m}/${y}`;
  checked={abertura:{},troca:{},fechamento:{}};
  currentSection=SECOES_POR_TURNO[currentTurno][0];
  document.getElementById('topbar-user-icon').textContent=nome.charAt(0).toUpperCase();
  document.getElementById('checklist-info-box').innerHTML=`
    <div>
      <div style="font-size:14px;font-weight:500;">${currentDateLabel}</div>
      <div style="font-size:11px;color:var(--muted);margin-top:2px;">${nome}</div>
    </div>
    <div style="display:flex;gap:4px;flex-wrap:wrap;">
      <span class="badge ${currentTurno==='dia'?'badge-dia':'badge-noite'}">${currentTurno==='dia'?'☀️ Dia':'🌙 Noite'}</span>
      <span class="badge badge-clima">${CLIMA_LABELS[clima]}</span>
    </div>`;
  showScreen('screen-checklist'); renderTopbar('checklist'); renderSection(currentSection);
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}

function renderTabs() {
  document.getElementById('section-tabs').innerHTML=SECOES_POR_TURNO[currentTurno].map(k=>
    `<div class="tab${currentSection===k?' active':''}" onclick="renderSection('${k}')">${SECTION_LABELS[k]}</div>`
  ).join('');
}

function renderSection(section) {
  currentSection=section; renderTabs();
  document.getElementById('checklist-items').innerHTML=CHECKLISTS[section].map((item,i)=>
    `<div class="checklist-item">
      <input type="checkbox" id="chk-${i}" ${checked[section][i]?'checked':''} onchange="toggleItem(${i})">
      <label for="chk-${i}" class="${checked[section][i]?'done':''}">${item}</label>
    </div>`).join('');
  updateProgress();
}

function toggleItem(i) {
  checked[currentSection][i]=!checked[currentSection][i];
  document.querySelector(`label[for="chk-${i}"]`).classList.toggle('done',!!checked[currentSection][i]);
  updateProgress();
}

function updateProgress() {
  const items=CHECKLISTS[currentSection];
  const done=items.filter((_,i)=>checked[currentSection][i]).length;
  const pct=Math.round(done/items.length*100);
  document.getElementById('progress-bar').style.width=pct+'%';
  document.getElementById('progress-label').textContent=`${done} de ${items.length} itens · ${pct}%`;
}

async function saveChecklist() {
  const btn = document.getElementById('btn-save');
  btn.textContent = 'Salvando...'; btn.disabled = true;
  const obs=document.getElementById('obs-text').value.trim();
  const clima=document.getElementById('clima-select').value;
  const secoes=SECOES_POR_TURNO[currentTurno];
  const totais={};
  secoes.forEach(s=>{ totais[s]={done:Object.values(checked[s]).filter(Boolean).length,total:CHECKLISTS[s].length}; });
  const record={
    id: Date.now().toString(),
    gerente: currentUser,
    turno: currentTurno,
    clima,
    data: currentDateLabel,
    date_key: currentDateKey,
    hora: new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'}),
    obs,
    checked,
    secoes,
    totais
  };
  try {
    await dbInsert(record);
    showToast('✅ Registro salvo!');
    showScreen('screen-login'); renderTopbar('checklist');
  } catch(e) {
    alert('Erro ao salvar: ' + e.message);
  } finally {
    btn.textContent='Salvar registro'; btn.disabled=false;
  }
}

async function goHistorico() {
  showScreen('screen-calendar'); renderTopbar('historico');
  document.getElementById('day-records').innerHTML='<div class="loading">Carregando...</div>';
  try {
    allRecords = await dbFetchAll();
  } catch(e) { allRecords=[]; }
  renderCalendar();
  document.getElementById('day-records').innerHTML='';
}

function renderCalendar() {
  document.getElementById('cal-month-label').textContent=`${MESES[calMonth]} ${calYear}`;
  const recDays={};
  allRecords.forEach(r=>{ if(r.date_key) recDays[r.date_key]=(recDays[r.date_key]||0)+1; });
  const firstDay=new Date(calYear,calMonth,1).getDay();
  const daysInMonth=new Date(calYear,calMonth+1,0).getDate();
  const todayKey=new Date().toISOString().split('T')[0];
  let html=DIAS.map(d=>`<div class="cal-dow">${d}</div>`).join('');
  for(let i=0;i<firstDay;i++) html+=`<div class="cal-day"></div>`;
  for(let d=1;d<=daysInMonth;d++){
    const dk=`${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const dow=new Date(calYear,calMonth,d).getDay();
    const isClosed=(dow===0||dow===1);
    const hasRec=!!recDays[dk], isToday=dk===todayKey;
    let cls='cal-day'+(hasRec?' has-record':'')+(isToday?' today':'')+(isClosed&&!hasRec?' closed':'');
    const dot=hasRec?`<div class="cal-dot"></div>`:'';
    const click=hasRec?`onclick="showDayRecords('${dk}')"`:''
    html+=`<div class="${cls}" ${click}><span>${d}</span>${dot}</div>`;
  }
  document.getElementById('cal-grid').innerHTML=html;
}

function changeMonth(dir){
  calMonth+=dir;
  if(calMonth<0){calMonth=11;calYear--;} if(calMonth>11){calMonth=0;calYear++;}
  renderCalendar(); document.getElementById('day-records').innerHTML='';
}

function showDayRecords(dateKey){
  const recs=allRecords.filter(r=>r.date_key===dateKey);
  if(!recs.length) return;
  if(recs.length===1){ showDetailRecord(recs[0]); return; }
  document.getElementById('day-records').innerHTML=
    `<div class="section-label" style="margin-top:0;">${recs[0].data||dateKey}</div>`+
    recs.map(r=>{
      const secoes=r.secoes||SECOES_POR_TURNO[r.turno]||[];
      const total=secoes.reduce((a,s)=>a+(r.totais[s]?r.totais[s].total:0),0);
      const done=secoes.reduce((a,s)=>a+(r.totais[s]?r.totais[s].done:0),0);
      const pct=total?Math.round(done/total*100):0;
      return `<div class="card card-clickable" onclick="showDetailFromKey('${r.id}')">
        <div class="card-badges">
          <span class="badge ${r.turno==='dia'?'badge-dia':'badge-noite'}">${r.turno==='dia'?'☀️ Dia':'🌙 Noite'}</span>
          <span class="badge badge-clima">${CLIMA_LABELS[r.clima]||r.clima}</span>
          <span class="badge ${pct===100?'badge-ok':'badge-partial'}">${pct===100?'✓ Completo':pct+'%'}</span>
        </div>
        <div class="card-title">${r.gerente}</div>
        <div class="card-meta">${r.hora}</div>
      </div>`;
    }).join('');
}

function showDetailFromKey(id){ const r=allRecords.find(x=>x.id===id); if(r) showDetailRecord(r); }

function showDetailRecord(r){
  const secoes=r.secoes||SECOES_POR_TURNO[r.turno]||[];
  const total=secoes.reduce((a,s)=>a+(r.totais[s]?r.totais[s].total:0),0);
  const done=secoes.reduce((a,s)=>a+(r.totais[s]?r.totais[s].done:0),0);
  const pct=total?Math.round(done/total*100):0;
  const notDoneSections=secoes.map(s=>{
    const nd=CHECKLISTS[s].filter((_,i)=>!(r.checked[s]&&r.checked[s][i]));
    return {s,nd};
  }).filter(x=>x.nd.length>0);

  const notDoneHTML=notDoneSections.length===0
    ? `<div class="all-done">✓ Tudo foi concluído neste turno!</div>`
    : notDoneSections.map(({s,nd})=>`
        <div class="detail-section-title" style="margin-top:8px;">${SECTION_LABELS[s]}</div>
        ${nd.map(item=>`<div class="not-done-item">⚠ ${item}</div>`).join('')}`).join('');

  document.getElementById('day-detail-content').innerHTML=`
    <div class="card" style="margin-bottom:1rem;">
      <div class="card-badges">
        <span class="badge ${r.turno==='dia'?'badge-dia':'badge-noite'}">${r.turno==='dia'?'☀️ Dia':'🌙 Noite'}</span>
        <span class="badge badge-clima">${CLIMA_LABELS[r.clima]||r.clima}</span>
        <span class="badge ${pct===100?'badge-ok':'badge-partial'}">${pct===100?'✓ Completo':pct+'%'}</span>
      </div>
      <div class="card-title">${r.gerente}</div>
      <div class="card-meta">${r.data||r.date_key} · ${r.hora}</div>
    </div>
    ${notDoneSections.length>0?`<div class="card" style="margin-bottom:1rem;border-left:2px solid #e5a000;border-radius:0 10px 10px 0;">
      <div class="detail-section-title" style="color:#7d5a00;">⚠️ Itens não concluídos</div>
      <div style="margin-top:8px;">${notDoneHTML}</div>
    </div>`:`<div style="margin-bottom:1rem;">${notDoneHTML}</div>`}
    <div class="card" style="margin-bottom:1rem;">
      <div class="detail-section-title" style="margin-bottom:10px;">Checklist completa</div>
      ${secoes.map(s=>`
        <div class="detail-section">
          <div class="detail-section-title">${SECTION_LABELS[s]} — ${r.totais[s]?r.totais[s].done+'/'+r.totais[s].total:''}</div>
          ${CHECKLISTS[s].map((item,i)=>{
            const ok=r.checked[s]&&r.checked[s][i];
            return `<div class="detail-item">
              <span class="${ok?'ok-icon':'no-icon'}">${ok?'✓':'✗'}</span>
              <span style="color:${ok?'#333':'#bbb'}">${item}</span>
            </div>`;
          }).join('')}
        </div>`).join('')}
    </div>
    ${r.obs?`<div class="card" style="border-left:2px solid var(--red);border-radius:0 10px 10px 0;">
      <div class="detail-section-title">Observações</div>
      <p style="font-size:13px;color:#333;margin-top:6px;line-height:1.6;">${r.obs}</p>
    </div>`:''}
  `;
  showScreen('screen-day-detail'); renderTopbar('historico');
}

function getWeekRange(offset) {
  const now=new Date();
  const day=now.getDay();
  const diffToTue=(day-2+7)%7;
  const start=new Date(now);
  start.setDate(now.getDate()-diffToTue+(offset*7));
  start.setHours(0,0,0,0);
  const end=new Date(start);
  end.setDate(start.getDate()+6);
  return {start,end};
}

function fmtDate(dt){ return `${String(dt.getDate()).padStart(2,'0')}/${String(dt.getMonth()+1).padStart(2,'0')}`; }

async function goReuniao() {
  showScreen('screen-reuniao'); renderTopbar('reuniao');
  document.getElementById('reuniao-content').innerHTML='<div class="loading">Carregando...</div>';
  const {start,end}=getWeekRange(currentWeekOffset);
  const from=start.toISOString().split('T')[0];
  const to=end.toISOString().split('T')[0];
  try {
    allRecords=await dbFetch(from,to);
  } catch(e){ allRecords=[]; }
  renderReuniao();
}

function changeWeek(dir){ currentWeekOffset+=dir; goReuniao(); }

function renderReuniao(){
  const {start,end}=getWeekRange(currentWeekOffset);
  document.getElementById('week-label').textContent=`${fmtDate(start)} – ${fmtDate(end)}`;
  const obsRecords=allRecords.filter(r=>r.obs&&r.obs.trim());
  const byDay={};
  allRecords.forEach(r=>{ if(!byDay[r.date_key]) byDay[r.date_key]=[]; byDay[r.date_key].push(r); });
  const sortedDays=Object.keys(byDay).sort();
  let html='';
  if(!allRecords.length){
    html='<div class="empty">Nenhum registro nesta semana.</div>';
  } else {
    if(obsRecords.length){
      html+=`<div class="section-label" style="margin-top:0;">Observações para a reunião</div>`;
      sortedDays.forEach(dk=>{
        const dayObs=byDay[dk].filter(r=>r.obs&&r.obs.trim());
        if(!dayObs.length) return;
        const [y,m,d]=dk.split('-');
        const dt=new Date(+y,+m-1,+d);
        dayObs.forEach(r=>{
          html+=`<div class="obs-entry">
            <div class="obs-entry-meta">${DIAS_FULL[dt.getDay()]}, ${d}/${m} · ${r.gerente} · ${r.turno==='dia'?'☀️ Dia':'🌙 Noite'} · ${CLIMA_LABELS[r.clima]||r.clima}</div>
            <div class="obs-entry-text">${r.obs}</div>
          </div>`;
        });
      });
    } else {
      html+=`<div class="card" style="margin-bottom:1rem;"><p style="font-size:13px;color:var(--muted);">Nenhuma observação registrada nesta semana.</p></div>`;
    }
    const incompleteAll=[];
    allRecords.forEach(r=>{
      const secoes=r.secoes||SECOES_POR_TURNO[r.turno]||[];
      secoes.forEach(s=>{
        CHECKLISTS[s].forEach((item,i)=>{
          if(!(r.checked[s]&&r.checked[s][i])) incompleteAll.push({item,s,gerente:r.gerente,turno:r.turno});
        });
      });
    });
    if(incompleteAll.length){
      html+=`<div class="section-label">Itens não concluídos na semana</div>`;
      const grouped={};
      incompleteAll.forEach(x=>{ if(!grouped[x.item]) grouped[x.item]=[]; grouped[x.item].push(x); });
      Object.entries(grouped).sort((a,b)=>b[1].length-a[1].length).forEach(([item,occs])=>{
        html+=`<div class="card" style="margin-bottom:6px;">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px;">
            <div style="font-size:13px;color:#333;">${item}</div>
            <span class="badge badge-partial" style="flex-shrink:0;">${occs.length}×</span>
          </div>
          <div style="font-size:11px;color:var(--muted);margin-top:4px;">${occs.map(o=>`${o.gerente} (${o.turno==='dia'?'dia':'noite'})`).join(', ')}</div>
        </div>`;
      });
    }
  }
  document.getElementById('reuniao-content').innerHTML=html;
}

renderTopbar('checklist');
</script>
</body>
</html>
